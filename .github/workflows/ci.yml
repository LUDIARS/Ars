name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-and-typecheck:
    runs-on: [self-hosted, ars-builder]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        working-directory: ars-editor
        run: npm ci

      - name: Lint
        working-directory: ars-editor
        run: npm run lint

      - name: Type check
        working-directory: ars-editor
        run: npx tsc -b --noEmit

  rust-check:
    runs-on: [self-hosted, ars-builder]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust format check
        working-directory: ars-editor/src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: ars-editor/src-tauri
        run: cargo clippy -- -D warnings

  build:
    needs: [lint-and-typecheck, rust-check]
    runs-on: [self-hosted, ars-builder]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        working-directory: ars-editor
        run: npm ci

      - name: Build Tauri app (Linux ARM64)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ars-editor
          tauriScript: npx tauri
          args: --target aarch64-unknown-linux-gnu

      - name: Build web server
        working-directory: ars-editor/src-tauri
        run: cargo build --release --features web-server --no-default-features --bin ars-web-server
