# =============================================================================
# Ars - Docker Compose
#
# 統合Webサーバー（Editor + Collaboration）を起動します。
# Redis: セッション管理
# SurrealDB (embedded): ユーザー・プロジェクト（グラフDB）
#
# 使用方法:
#   docker compose up -d        # サービス起動
#   docker compose logs -f      # ログ確認
#   docker compose down         # サービス停止
#
# ローカルビルド:
#   docker compose up -d --build
#
# 環境変数:
#   IMAGE_TAG (default: latest) - 使用するイメージのタグ
#   DOCKER_PLATFORM (default: linux/arm64) - ターゲットプラットフォーム
#     例: DOCKER_PLATFORM=linux/amd64 docker compose up -d --build
# =============================================================================

services:
  redis:
    image: redis:7-alpine
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    container_name: ars-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  ars:
    image: ghcr.io/ludiars/ars:${IMAGE_TAG:-latest}
    build:
      context: .
      platforms:
        - ${DOCKER_PLATFORM:-linux/arm64}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    container_name: ars
    ports:
      - "${ARS_PORT:-5173}:5173"
    volumes:
      - ars-data:/app/data
      - ./secrets.toml:/app/secrets.toml:ro
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  ars-data:
  redis-data:
